<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page_title">TRIZ Texnologiyasi - O'qitish Platformasi</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <h1 data-i18n="platform_name">TRIZ Platformasi</h1>
      </div>
      <div class="nav-links">
        <a href="login.html" data-i18n="nav_login">Kirish</a>
        <a href="#about" data-i18n="nav_about">Qo'llanma</a>
      </div>
      <select class="language-selector" onchange="changeLanguage(this.value)">
        <option value="uz">O'zbek</option>
        <option value="en">English</option>
        <option value="ru">Русский</option>
      </select>
    </div>
  </nav>

  <section class="hero">
    <div class="container">
      <h1 data-i18n="hero_title">TRIZ Texnologiyasi Bilan Mustaqil O'qitish</h1>
      <p data-i18n="hero_subtitle">Innovatsiya va masala yechishni o'rganing</p>
      <a href="login.html" class="btn btn-primary" data-i18n="btn_start">Boshlash</a>
    </div>
  </section>

  <section id="about" class="about">
    <div class="container">
      <h2 data-i18n="about_title">TRIZ Nima?</h2>
      <p data-i18n="about_desc">TRIZ - Inventiv Muammolarni Yechish Nazariyasi</p>
    </div>
  </section>

  <footer>
    <p data-i18n="footer_copy">&copy; 2024 TRIZ Platformasi. Barcha huquqlar saqlanib qoldi.</p>
  </footer>

  <script src="js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('language') || 'uz';
      document.querySelector('.language-selector').value = savedLang;
      translatePage(savedLang);
    });

    function changeLanguage(lang) {
      localStorage.setItem('language', lang);
      translatePage(lang);
    }
  </script>
</body>
</html>
